.ans-btn.wrong{border-color:#FF2D55;background-color:rgba(255,45,85,0.1)}

.toast{

}

.confetti-box{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:900;overflow:hidden}

/* MAX punti per domanda (se rispondi in 0 sec = max, scade = 0) */
var MAX_PTS = 100;

var player = null;
var curQuiz = null;
var curQs = [];

/* ========== UTILS ========== */
function esc(s) {
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(s || ''));
  return d.innerHTML;
}

function toast(m, t) {
  var o = document.querySelector('.toast');
  if (o) o.remove();
  var e = document.createElement('div');
  e.className = 'toast ' + (t || 'info');
  e.innerHTML = m;
  document.body.appendChild(e);
  setTimeout(function() { if (e.parentNode) e.remove(); }, 3000);
}

function showScreen(id) {
  var all = document.querySelectorAll('.screen');
  for (var i = 0; i < all.length; i++) all[i].classList.remove('active');
  document.getElementById('s-' + id).classList.add('active');
}

function goNav(i) {
  if (i === 0) { showScreen('home'); loadHome(); }
  if (i === 1) { showScreen('rank'); loadRank(); }
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function getLevel(pts) {
  if (pts >= 5000) return '&#128081; Leggenda';
  if (pts >= 3000) return '&#11088; Campione';
  if (pts >= 1500) return '&#128293; Esperto';
  if (pts >= 500) return '&#9917; Appassionato';
  return '&#127793; Esordiente';
}

function fireConfetti() {
  var box = document.getElementById('confettiBox');
  var colors = ['#FF2D55','#34C759','#007AFF','#FFD60A','#FF9500','#AF52DE','#FFFFFF'];
  for (var i = 0; i < 50; i++) {
    var c = document.createElement('div');
    c.className = 'confetto';
    c.style.left = Math.random() * 100 + '%';
    c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    c.style.width = (6 + Math.random() * 6) + 'px';
    c.style.height = (6 + Math.random() * 6) + 'px';
    c.style.animationDelay = (Math.random() * 0.8) + 's';
    c.style.webkitAnimationDelay = (Math.random() * 0.8) + 's';
    c.style.animationDuration = (2 + Math.random() * 1.5) + 's';
    c.style.webkitAnimationDuration = (2 + Math.random() * 1.5) + 's';
    box.appendChild(c);
  }
  setTimeout(function() { box.innerHTML = ''; }, 4000);
}

/* ========== REGISTER / LOGIN ========== */
function doRegister() {
  var name = document.getElementById('regName').value.trim();
  var email = document.getElementById('regEmail').value.trim();
  if (!name) { toast('Inserisci il tuo nome', 'error'); return; }

  var pid = localStorage.getItem('sqz_player_id');
  if (!pid) {
    pid = typeof crypto.randomUUID === 'function' ? crypto.randomUUID() : 'p-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('sqz_player_id', pid);
  }

  sb.from('sq_players').upsert({
    player_id: pid,
    player_name: name,
    email: email || null,
    updated_at: new Date().toISOString()
  }).select().then(function(res) {
    if (res.error) { toast('Errore: ' + res.error.message, 'error'); return; }
    player = res.data[0];
    localStorage.setItem('sqz_player_name', name);
    showScreen('home');
    loadHome();
    toast('Benvenuto ' + esc(name) + '!', 'success');
  });
}

function autoLogin() {
  var pid = localStorage.getItem('sqz_player_id');
  var pname = localStorage.getItem('sqz_player_name');
  if (!pid || !pname) return;

  sb.from('sq_players').select('*').eq('player_id', pid).then(function(res) {
    if (res.data && res.data.length > 0) {
      player = res.data[0];
      showScreen('home');
      loadHome();
    }
  });
}

/* ========== HOME ========== */
function loadHome() {
  if (!player) return;
  document.getElementById('homeUser').textContent = player.player_name;
  document.getElementById('homePts').textContent = player.total_points || 0;
  document.getElementById('homeLevel').innerHTML = getLevel(player.total_points || 0);

  /* carica premi */
  sb.from('sq_settings').select('key,value').in('key', ['weekly_prize','monthly_prizes']).then(function(r) {
    var html = '';
    if (r.data) {
      for (var i = 0; i < r.data.length; i++) {
        var s = r.data[i];
        if (s.key === 'weekly_prize' && s.value) {
          var v = String(s.value).replace(/"/g, '').trim();
          if (v) html = html + '<div class="prize-banner"><div class="prize-banner-title">&#127942; Premio settimanale</div><div class="prize-banner-text">' + esc(v) + '</div></div>';
        }
      }
    }
    document.getElementById('prizeBanner').innerHTML = html;
  });

  /* carica quiz gia giocati */
  sb.from('sq_results').select('quiz_id,score').eq('player_id', player.player_id).then(function(rr) {
    playedIds = [];
    var playedMap = {};
    if (rr.data) {
      for (var i = 0; i < rr.data.length; i++) {
        playedIds.push(rr.data[i].quiz_id);
        playedMap[rr.data[i].quiz_id] = rr.data[i].score;
      }
    }

    /* carica tutti i quiz */
    sb.from('sq_quizzes').select('*').in('status', ['live','ended']).order('created_at', { ascending: false }).then(function(qr) {
      var liveHtml = '';
      var doneHtml = '';
      var liveCount = 0;
      var doneCount = 0;

      if (qr.data) {
        for (var j = 0; j < qr.data.length; j++) {
          var q = qr.data[j];
          var qn = 0;
          try { qn = q.questions.length; } catch(e) {}
          var isPlayed = playedIds.indexOf(q.id) !== -1;
          var isLive = q.status === 'live';
          var expired = false;
          if (q.deadline) { expired = new Date(q.deadline) < new Date(); }

          if (isPlayed) {
            /* completato */
            doneCount++;
            doneHtml = doneHtml + '<div class="quiz-card">';
            doneHtml = doneHtml + '<div class="quiz-card-top"><div class="quiz-card-title">' + esc(q.title) + '</div><span class="quiz-tag done">Fatto</span></div>';
            doneHtml = doneHtml + '<div class="quiz-card-meta"><span>' + esc(q.category) + '</span><span>' + qn + ' domande</span></div>';
            doneHtml = doneHtml + '<div class="quiz-card-score">&#10003; Punteggio: ' + playedMap[q.id] + ' pts</div>';
            doneHtml = doneHtml + '</div>';
          } else if (isLive && !expired) {
            /* disponibile */
            liveCount++;
            liveHtml = liveHtml + '<div class="quiz-card" onclick="startQuiz(' + q.id + ')">';
            liveHtml = liveHtml + '<div class="quiz-card-top"><div class="quiz-card-title">' + esc(q.title) + '</div>';
            if (q.quiz_type === 'speciale') {
              liveHtml = liveHtml + '<span class="quiz-tag spec">&#9733; x2</span>';
            } else {
              liveHtml = liveHtml + '<span class="quiz-tag live">Live</span>';
            }
            liveHtml = liveHtml + '</div>';
            liveHtml = liveHtml + '<div class="quiz-card-meta"><span>' + esc(q.category) + '</span><span>' + qn + ' domande</span>';
            if (q.deadline) {
              var dl = new Date(q.deadline);
              liveHtml = liveHtml + '<span>Scade: ' + dl.toLocaleString('it-IT', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) + '</span>';
            }
            liveHtml = liveHtml + '</div>';
            liveHtml = liveHtml + '<button class="quiz-card-go">&#9654; GIOCA ORA</button>';
            liveHtml = liveHtml + '</div>';
          }
        }
      }

      if (liveCount === 0) {
        liveHtml = '<div class="empty"><div class="icon">&#128564;</div><div class="msg">Nessun quiz disponibile al momento</div></div>';
      }
      document.getElementById('quizList').innerHTML = liveHtml;

      if (doneCount > 0) {
        document.getElementById('doneSection').style.display = 'block';
        document.getElementById('doneList').innerHTML = doneHtml;
      } else {
        document.getElementById('doneSection').style.display = 'none';
      }
    });
  });
}

/* ========== START QUIZ ========== */
function startQuiz(qid) {
  sb.from('sq_quizzes').select('*').eq('id', qid).single().then(function(r) {
    if (r.error || !r.data) { toast('Quiz non trovato', 'error'); return; }
    curQuiz = r.data;

    /* controlla se gia giocato */
    if (playedIds.indexOf(qid) !== -1) { toast('Hai gia giocato questo quiz', 'info'); return; }

    /* controlla deadline */
    if (curQuiz.deadline && new Date(curQuiz.deadline) < new Date()) { toast('Quiz scaduto', 'error'); return; }

    /* prepara domande con shuffle risposte */
    curQs = [];
    var raw = curQuiz.questions || [];
    for (var i = 0; i < raw.length; i++) {
      var q = raw[i];
      var shuffled = shuffle(q.answers);
      curQs.push({
        question: q.question,
        answers: shuffled,
        correct: q.correct
      });
    }

    curIdx = 0;
    answers = [];
    timerMax = curQuiz.time_per_question || 20;

    showScreen('play');
    document.getElementById('playCat').textContent = curQuiz.category || '';
    showQuestion();
  });
}

/* ========== PLAY ========== */
function showQuestion() {
  if (curIdx >= curQs.length) { endGame(); return; }

  answered = false;
  var q = curQs[curIdx];
  var letters = ['A','B','C','D'];

  document.getElementById('playCount').textContent = (curIdx + 1) + ' / ' + curQs.length;
  document.getElementById('playQ').textContent = q.question;

  var aHtml = '';
  for (var i = 0; i < q.answers.length; i++) {
    aHtml = aHtml + '<button class="ans-btn" onclick="pickAnswer(' + i + ')" id="ans' + i + '">';
    aHtml = aHtml + '<span class="letter">' + letters[i] + '</span>';
    aHtml = aHtml + '<span class="atxt">' + esc(q.answers[i]) + '</span>';
    aHtml = aHtml + '</button>';
  }
  document.getElementById('playAns').innerHTML = aHtml;

  /* timer */
  timerVal = timerMax;
  qStart = Date.now();
  document.getElementById('timerNum').textContent = timerVal;
  var fill = document.getElementById('timerFill');
  fill.style.width = '100%';
  fill.className = 'timer-fill green';

  clearInterval(timerInterval);
  timerInterval = setInterval(function() {
    timerVal--;
    if (timerVal < 0) timerVal = 0;
    document.getElementById('timerNum').textContent = timerVal;

    var pct = (timerVal / timerMax) * 100;
    fill.style.width = pct + '%';
    if (pct <= 25) fill.className = 'timer-fill red';
    else if (pct <= 50) fill.className = 'timer-fill yellow';
    else fill.className = 'timer-fill green';

    if (timerVal <= 0) {
      clearInterval(timerInterval);
      if (!answered) timeUp();
    }
  }, 1000);
}

function pickAnswer(idx) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);

  var elapsed = (Date.now() - qStart) / 1000;
  var q = curQs[curIdx];
  var picked = q.answers[idx];
  var isCorrect = picked === q.correct;

  /* punti: piu veloce = piu punti. Lineare da MAX_PTS (0s) a 0 (timerMax s) */
  var pts = 0;
  if (isCorrect) {
    var ratio = Math.max(0, 1 - (elapsed / timerMax));
    pts = Math.round(MAX_PTS * ratio);
    if (pts < 1) pts = 1; /* minimo 1 pt se corretta */
    if (curQuiz.quiz_type === 'speciale') pts = pts * 2;
  }

  answers.push({
    question: q.question,
    picked: picked,
    correct: q.correct,
    is_correct: isCorrect,
    time: Math.round(elapsed * 10) / 10,
    points: pts
  });

  /* evidenzia risposte */
  var btns = document.querySelectorAll('.ans-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.add('disabled');
    if (q.answers[i] === q.correct) btns[i].classList.add('correct');
    else if (i === idx && !isCorrect) btns[i].classList.add('wrong');
    else btns[i].classList.add('dim');
  }

  /* avanti dopo 1.2s */
  setTimeout(function() {
    curIdx++;
    showQuestion();
  }, 1200);
}

function timeUp() {
  answered = true;
  answers.push({
    question: curQs[curIdx].question,
    picked: null,
    correct: curQs[curIdx].correct,
    is_correct: false,
    time: timerMax,
    points: 0
  });

  /* mostra corretta */
  var btns = document.querySelectorAll('.ans-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.add('disabled');
    if (curQs[curIdx].answers[i] === curQs[curIdx].correct) btns[i].classList.add('correct');
    else btns[i].classList.add('dim');
  }

  setTimeout(function() {
    curIdx++;
    showQuestion();
  }, 1200);
}

function quitGame() {
  clearInterval(timerInterval);
  showScreen('home');
  loadHome();
}

/* ========== END GAME ========== */
function endGame() {
  clearInterval(timerInterval);

  var totalPts = 0;
  var okCount = 0;
  var wrongCount = 0;
  var totalTime = 0;

  for (var i = 0; i < answers.length; i++) {
    totalPts = totalPts + answers[i].points;
    if (answers[i].is_correct) okCount++;
    else wrongCount++;
    totalTime = totalTime + answers[i].time;
  }

  var avgTime = answers.length > 0 ? Math.round((totalTime / answers.length) * 10) / 10 : 0;

  /* result screen */
  var pct = answers.length > 0 ? Math.round((okCount / answers.length) * 100) : 0;
  if (pct >= 80) {
    document.getElementById('resIcon').innerHTML = '&#127942;';
    document.getElementById('resTitle').textContent = 'Fantastico!';
    fireConfetti();
  } else if (pct >= 50) {
    document.getElementById('resIcon').innerHTML = '&#128170;';
    document.getElementById('resTitle').textContent = 'Bene!';
  } else {
    document.getElementById('resIcon').innerHTML = '&#128172;';
    document.getElementById('resTitle').textContent = 'Prossima volta!';
  }

  document.getElementById('resSub').textContent = curQuiz.title;
  document.getElementById('resScore').textContent = totalPts;
  document.getElementById('resOk').textContent = okCount;
  document.getElementById('resWrong').textContent = wrongCount;
  document.getElementById('resAvg').textContent = avgTime + 's';

  showScreen('result');

  /* salva risultato */
  sb.from('sq_results').insert([{
    quiz_id: curQuiz.id,
    player_id: player.player_id,
    player_name: player.player_name,
    score: totalPts,
    correct_count: okCount,
    wrong_count: wrongCount,
    avg_time: avgTime,
    answers: answers,
    completed_at: new Date().toISOString()
  }]).then(function(r) {
    if (r.error) { toast('Errore salvataggio', 'error'); return; }

    /* aggiorna player stats */
    var newTotal = (player.total_points || 0) + totalPts;
    var newPlayed = (player.quizzes_played || 0) + 1;
    var newLevel = '';
    if (newTotal >= 5000) newLevel = 'Leggenda';
    else if (newTotal >= 3000) newLevel = 'Campione';
    else if (newTotal >= 1500) newLevel = 'Esperto';
    else if (newTotal >= 500) newLevel = 'Appassionato';
    else newLevel = 'Esordiente';

    sb.from('sq_players').update({
      total_points: newTotal,
      quizzes_played: newPlayed,
      level: newLevel,
      updated_at: new Date().toISOString()
    }).eq('player_id', player.player_id).then(function() {
      player.total_points = newTotal;
      player.quizzes_played = newPlayed;
      player.level = newLevel;
    });

    /* aggiorna players_count sul quiz */
    sb.from('sq_results').select('*', { count: 'exact' }).eq('quiz_id', curQuiz.id).then(function(cr) {
      var cnt = cr.count || 0;
      sb.from('sq_quizzes').update({ players_count: cnt }).eq('id', curQuiz.id);
    });
  });
}

/* ========== CLASSIFICA ========== */
function loadRank() {
  if (player) {
    document.getElementById('rankPts').innerHTML = '&#11088; ' + (player.total_points || 0) + ' pts';
  }

  sb.from('sq_players').select('*').order('total_points', { ascending: false }).limit(50).then(function(r) {
    var box = document.getElementById('rankBox');
    if (!r.data || r.data.length === 0) {
      box.innerHTML = '<div class="empty"><div class="icon">&#127942;</div><div class="msg">Nessun giocatore</div></div>';
      return;
    }
    var medals = ['&#129351;','&#129352;','&#129353;'];
    var html = '<div class="rank-card">';
    for (var i = 0; i < r.data.length; i++) {
      var p = r.data[i];
      var isMe = player && p.player_id === player.player_id;
      html = html + '<div class="rank-row' + (isMe ? ' me' : '') + '">';
      html = html + '<div class="rank-pos">' + (i < 3 ? medals[i] : (i + 1)) + '</div>';
      html = html + '<div class="rank-name">' + esc(p.player_name);
      if (p.level) html = html + ' <span style="font-size:11px;color:#5A6577;">' + esc(p.level) + '</span>';
      html = html + '</div>';
      html = html + '<div class="rank-score">' + (p.total_points || 0) + '</div>';
      html = html + '<div class="rank-det">' + (p.quizzes_played || 0) + ' quiz</div>';
      html = html + '</div>';
    }
    html = html + '</div>';
    box.innerHTML = html;
  });
}

/* ========== INIT ========== */
function init() {
  autoLogin();
}
init();
