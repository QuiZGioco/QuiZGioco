<style>
/* CSS completo (stesso di prima) */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
:root{--navy:#1B2A4A;--navy-deep:#111D35;--navy-mid:#1F3050;--navy-light:#243758;--navy-lighter:#2E4468;--red:#E42528;--red-dark:#C41E21;--red-glow:rgba(228,37,40,0.2);--green:#2ECC71;--green-dark:#27AE60;--yellow:#F1C40F;--gold:#FFD700;--white:#FFFFFF;--text-pri:#FFFFFF;--text-sec:#B8C6DB;--text-mut:#6B7FA0;--card-bg:#1F3050;--card-bdr:rgba(255,255,255,0.08);--radius:14px;--radius-sm:10px}
body{font-family:'Source Sans 3',-apple-system,sans-serif;background:var(--navy-deep);color:var(--text-pri);min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.app{max-width:420px;margin:0 auto;min-height:100vh;min-height:100dvh;position:relative}
.screen{display:none;min-height:100vh;min-height:100dvh;padding:20px;padding-top:20px}.screen.active{display:block;animation:fadeIn 0.35s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--card-bg);border:1px solid var(--card-bdr);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.btn{padding:16px;border:none;border-radius:var(--radius-sm);font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;width:100%;text-align:center;transition:transform 0.12s}
.btn:active{transform:scale(0.97)}.btn:disabled{opacity:0.5}
.btn-red{background:linear-gradient(135deg,var(--red),var(--red-dark));color:white;box-shadow:0 4px 16px rgba(228,37,40,0.25)}
.btn-navy{background:var(--navy-lighter);color:var(--text-sec);border:1px solid var(--card-bdr)}
.btn-wa{background:#25D366;color:white;box-shadow:0 4px 16px rgba(37,211,102,0.25);display:flex;align-items:center;justify-content:center;gap:10px}
.field-input{width:100%;padding:14px 16px;background:var(--navy-light);border:2px solid var(--card-bdr);border-radius:var(--radius-sm);color:var(--white);font-family:'Source Sans 3',sans-serif;font-size:16px;font-weight:500;outline:none;transition:border-color 0.2s;-webkit-appearance:none;margin-bottom:14px}
.field-input:focus{border-color:var(--red)}
.field-label{display:block;font-size:12px;font-weight:700;color:var(--text-sec);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.login-glow{position:relative}.login-glow::before{content:'';position:absolute;top:-40px;left:-50%;width:200%;height:350px;background:radial-gradient(ellipse at center,var(--red-glow) 0%,transparent 70%);pointer-events:none}
.logo-wrap{text-align:center;padding:50px 0 30px;position:relative}.logo-icon{width:80px;height:80px;margin:0 auto 14px;background:linear-gradient(145deg,var(--red),var(--red-dark));border-radius:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 30px rgba(228,37,40,0.3);font-size:36px}
.brand{font-family:'Outfit',-apple-system,Helvetica,sans-serif;font-weight:800;letter-spacing:0.5px;display:inline-block}.brand .qui{color:#FFFFFF}.brand .zl{color:#FF2D55;font-style:italic;display:inline-block;-webkit-transform:skewX(-10deg);transform:skewX(-10deg);margin:0 1px}.brand .gioco{color:#FFFFFF}
.logo-title{font-family:'Outfit',-apple-system,Helvetica,sans-serif;font-size:42px;font-weight:800;letter-spacing:2px}
.logo-sub{color:var(--text-sec);font-size:14px;font-weight:500;margin-top:4px}
.login-footer{text-align:center;color:var(--text-mut);font-size:12px;margin-top:16px;line-height:1.6}
/* resto del CSS (quiz-card, timer, result, ecc.) è identico alle versioni precedenti */
</style>

// NUOVA REGISTRAZIONE SEMPLICE
function doRegister() {
  var name = document.getElementById('regName').value.trim();
  var email = document.getElementById('regEmail').value.trim();

  if (!name) {
    showToast('Inserisci il tuo nome', 'error');
    return;
  }

  // Genera UUID se non esiste
  let playerId = localStorage.getItem('player_id');
  if (!playerId) {
    playerId = crypto.randomUUID ? crypto.randomUUID() : 'player-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('player_id', playerId);
  }

  sb.from('sq_players').upsert({
    player_id: playerId,
    player_name: name,
    email: email || null,
    updated_at: new Date().toISOString()
  }).select().then(function(res) {
    if (res.error) {
      showToast('Errore: ' + res.error.message, 'error');
      return;
    }
    player = res.data[0];
    sessionStorage.setItem('sq_player', JSON.stringify(player));
    showScreen('home');
    loadHome();
    showToast('Benvenuto ' + name + '!', 'success');
  });
}
